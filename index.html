<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyMap — Your Exam Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
/* ── Reset & Variables ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #faf8f3;
  --bg2:         #f2ede3;
  --card:        #ffffff;
  --card2:       #fdf9f2;
  --border:      #e8e0cc;
  --text:        #2c2416;
  --text2:       #6b5e45;
  --text3:       #9e8e72;
  --accent:      #c17f3a;
  --accent2:     #e8a84e;
  --accent-soft: #fdefd8;
  --green:       #4a8c5c;
  --green-soft:  #e8f4ec;
  --red:         #c0392b;
  --red-soft:    #fdecea;
  --amber:       #d4831e;
  --shadow:      0 2px 16px rgba(44,36,22,.09);
  --shadow-lg:   0 8px 40px rgba(44,36,22,.13);
  --radius:      14px;
  --transition:  0.22s ease;
}

[data-theme="dark"] {
  --bg:          #1a1510;
  --bg2:         #231e16;
  --card:        #2a2218;
  --card2:       #312a1f;
  --border:      #3d3325;
  --text:        #f0e8d8;
  --text2:       #c4ae8a;
  --text3:       #8a7a60;
  --accent:      #e8a04a;
  --accent2:     #f0b85a;
  --accent-soft: #3a2e1a;
  --green:       #5aaa70;
  --green-soft:  #1a2e20;
  --red:         #e05a48;
  --red-soft:    #2e1a18;
  --amber:       #e8a04a;
  --shadow:      0 2px 16px rgba(0,0,0,.3);
  --shadow-lg:   0 8px 40px rgba(0,0,0,.4);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  line-height: 1.6;
}

/* subtle paper grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── Layout ─────────────────────────────────────────────────────── */
.app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }

/* ── Header ─────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
}

.logo { display: flex; align-items: baseline; gap: 10px; }

.logo-text {
  font-family: 'Lora', serif;
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo-sub {
  font-family: 'Caveat', cursive;
  font-size: 1.05rem;
  color: var(--text3);
}

.header-actions { display: flex; gap: 10px; }

.btn-icon {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text2);
  transition: all var(--transition);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-icon:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

/* ── Cards ──────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 22px;
  transition: background var(--transition), border-color var(--transition);
}

.card-title {
  font-family: 'Lora', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .icon { font-size: 1.1rem; }

/* ── Form ───────────────────────────────────────────────────────── */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}

@media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 5px; }

label {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text3);
  text-transform: uppercase;
}

input[type="text"],
input[type="date"] {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  width: 100%;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(193,127,58,.13);
}

input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

/* Confidence slider */
.conf-wrap { display: flex; flex-direction: column; gap: 8px; }

.conf-track {
  display: flex;
  gap: 8px;
  align-items: center;
}

.conf-btn {
  flex: 1;
  padding: 8px 4px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg2);
  cursor: pointer;
  font-size: 1.3rem;
  text-align: center;
  transition: all var(--transition);
  line-height: 1;
}

.conf-btn.active {
  border-color: var(--accent);
  background: var(--accent-soft);
  transform: scale(1.08);
  box-shadow: 0 2px 8px rgba(193,127,58,.2);
}

.conf-label {
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: var(--text3);
  text-align: center;
}

/* ── Primary Button ──────────────────────────────────────────────── */
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 3px 12px rgba(193,127,58,.3);
}
.btn-primary:hover { background: var(--amber); transform: translateY(-1px); box-shadow: 0 5px 18px rgba(193,127,58,.35); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-secondary:hover { border-color: var(--red); color: var(--red); }

.btn-danger {
  background: transparent;
  color: var(--text3);
  border: none;
  cursor: pointer;
  font-size: 1rem;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color var(--transition), background var(--transition);
  line-height: 1;
}
.btn-danger:hover { color: var(--red); background: var(--red-soft); }

/* ── Subject chips ───────────────────────────────────────────────── */
.subject-list { display: flex; flex-direction: column; gap: 10px; }

.subject-chip {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.chip-color {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.chip-info { flex: 1; }
.chip-name { font-weight: 600; font-size: 0.95rem; }
.chip-meta { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }

.chip-conf { font-size: 1.3rem; }

/* ── Generate button row ─────────────────────────────────────────── */
.generate-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.encourage {
  font-family: 'Caveat', cursive;
  font-size: 1.05rem;
  color: var(--accent);
}

/* ── Schedule ────────────────────────────────────────────────────── */
.schedule-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}

.schedule-header h2 {
  font-family: 'Lora', serif;
  font-size: 1.2rem;
  font-weight: 600;
}

.copy-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 7px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.copy-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-soft); }
.copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-soft); }

/* Day block */
.day-block {
  margin-bottom: 18px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.day-name {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 1rem;
}

.day-date { font-size: 0.8rem; color: var(--text3); }

.day-quote {
  font-family: 'Caveat', cursive;
  font-size: 0.92rem;
  color: var(--accent);
  font-style: italic;
}

.day-sessions { padding: 12px 16px; display: flex; flex-direction: column; gap: 9px; background: var(--card); }

.session {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 9px;
  border-left: 3px solid;
  transition: opacity var(--transition);
  cursor: pointer;
}

.session.done { opacity: 0.45; }

.session-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.session-info { flex: 1; }
.session-name { font-weight: 600; font-size: 0.93rem; }
.session-time { font-size: 0.78rem; color: var(--text3); }

.session-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
  transition: all var(--transition);
}
.session.done .session-check { background: var(--green); border-color: var(--green); color: #fff; }

/* exam day badge */
.exam-badge {
  display: inline-block;
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 7px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* ── Progress tracker ────────────────────────────────────────────── */
.progress-wrap {
  margin-bottom: 22px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-label { font-size: 0.82rem; color: var(--text3); font-weight: 500; }
.progress-pct { font-family: 'Lora', serif; font-size: 1rem; color: var(--accent); font-weight: 600; }

.progress-bar {
  height: 8px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* subject progress rows */
.subj-progress { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }

.sp-row { display: flex; align-items: center; gap: 10px; }
.sp-name { font-size: 0.82rem; font-weight: 500; width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sp-bar { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.sp-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
.sp-pct { font-size: 0.75rem; color: var(--text3); width: 32px; text-align: right; }

/* ── Pomodoro ────────────────────────────────────────────────────── */
.pomo-card {
  position: sticky;
  bottom: 20px;
  z-index: 100;
  background: var(--card);
  border: 1.5px solid var(--accent);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.pomo-display {
  font-family: 'Lora', serif;
  font-size: 2.2rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  min-width: 88px;
  text-align: center;
}

.pomo-label {
  font-size: 0.78rem;
  color: var(--text3);
  text-align: center;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: -4px;
}

.pomo-info { display: flex; flex-direction: column; align-items: center; }

.pomo-controls { display: flex; gap: 8px; align-items: center; }

.pomo-btn {
  background: var(--accent-soft);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 8px 14px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--accent);
  transition: all var(--transition);
  letter-spacing: 0.02em;
}
.pomo-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.pomo-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.pomo-mode { display: flex; gap: 6px; }

.pomo-phase {
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: var(--text3);
  flex: 1;
  min-width: 120px;
}

.pomo-sessions { font-size: 0.8rem; color: var(--text3); }
.pomo-sessions span { color: var(--accent); font-weight: 700; }

/* ── Empty states & helpers ──────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--text3);
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  line-height: 1.7;
}

.section-divider {
  border: none;
  border-top: 1.5px dashed var(--border);
  margin: 6px 0 18px;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 6px;
  padding: 2px 9px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* toast */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  border-radius: 10px;
  padding: 10px 22px;
  font-size: 0.88rem;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* section fade in */
#schedule-section { display: none; }
#schedule-section.visible { display: block; animation: fadeUp 0.5s ease; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-text">StudyMap</span>
      <span class="logo-sub">you've got this 📖</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="toggleTheme()" title="Toggle dark mode">
        <span id="theme-icon">🌙</span> Dark
      </button>
    </div>
  </header>

  <!-- Add Subject Card -->
  <div class="card">
    <div class="card-title"><span class="icon">📚</span> Add Your Subjects</div>

    <div class="form-row">
      <div class="field">
        <label>Subject Name</label>
        <input type="text" id="subj-name" placeholder="e.g. Mathematics" maxlength="40" />
      </div>
      <div class="field">
        <label>Exam Date</label>
        <input type="date" id="subj-date" />
      </div>
    </div>

    <div class="field" style="margin-bottom:16px">
      <label>Confidence Level</label>
      <div class="conf-wrap">
        <div class="conf-track">
          <button class="conf-btn" data-val="1" onclick="setConf(1)" title="Very nervous">😬</button>
          <button class="conf-btn" data-val="2" onclick="setConf(2)" title="A bit shaky">😟</button>
          <button class="conf-btn" data-val="3" onclick="setConf(3)" title="Okay-ish">😐</button>
          <button class="conf-btn" data-val="4" onclick="setConf(4)" title="Pretty good">🙂</button>
          <button class="conf-btn active" data-val="5" onclick="setConf(5)" title="I got this!">😎</button>
        </div>
        <div class="conf-label" id="conf-label">Confidence: I got this! (5/5)</div>
      </div>
    </div>

    <button class="btn-primary" onclick="addSubject()">＋ Add Subject</button>
  </div>

  <!-- Subject List -->
  <div class="card" id="subjects-card" style="display:none">
    <div class="card-title"><span class="icon">🗂️</span> Your Subjects <span id="subj-count" class="tag" style="margin-left:4px">0</span></div>
    <div class="subject-list" id="subject-list"></div>
    <hr class="section-divider" style="margin-top:18px" />
    <div class="generate-row">
      <span class="encourage" id="encourage-msg">Add at least 3 subjects to generate your plan ✨</span>
      <button class="btn-primary" onclick="generatePlan()" id="gen-btn" disabled>Generate My Plan →</button>
    </div>
  </div>

  <!-- Schedule Section -->
  <div id="schedule-section">

    <!-- Progress Tracker -->
    <div class="card progress-wrap" id="progress-card">
      <div class="card-title"><span class="icon">📊</span> Progress Tracker</div>
      <div class="progress-top">
        <span class="progress-label">Overall completion</span>
        <span class="progress-pct" id="overall-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="overall-fill" style="width:0%"></div></div>
      <div class="subj-progress" id="subj-progress"></div>
    </div>

    <!-- Schedule -->
    <div class="card">
      <div class="schedule-header">
        <h2>📅 Your Study Schedule</h2>
        <button class="copy-btn" onclick="copyPlan()" id="copy-btn">📋 Copy Plan</button>
      </div>
      <div id="schedule-output"></div>
    </div>

  </div>

  <!-- Pomodoro (sticky footer) -->
  <div class="pomo-card" id="pomo-card">
    <div class="pomo-info">
      <div class="pomo-display" id="pomo-display">25:00</div>
      <div class="pomo-label" id="pomo-label">Focus</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
      <div class="pomo-controls">
        <button class="pomo-btn" id="pomo-start-btn" onclick="pomodoroToggle()">▶ Start</button>
        <button class="pomo-btn" onclick="pomodoroReset()">↺ Reset</button>
        <div class="pomo-mode">
          <button class="pomo-btn active" id="mode-focus" onclick="setPomoMode('focus')">Focus</button>
          <button class="pomo-btn" id="mode-short" onclick="setPomoMode('short')">5 min</button>
          <button class="pomo-btn" id="mode-long" onclick="setPomoMode('long')">15 min</button>
        </div>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <span class="pomo-phase" id="pomo-phase">Start a 25-min focus session 🍅</span>
        <span class="pomo-sessions">Sessions: <span id="pomo-count">0</span></span>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── Colour palette for subjects ─────────────────────────────────── */
const PALETTE = [
  { bg: '#fdefd8', border: '#c17f3a', dot: '#c17f3a' },
  { bg: '#e8f4ec', border: '#4a8c5c', dot: '#4a8c5c' },
  { bg: '#e8eef8', border: '#3a6cb5', dot: '#3a6cb5' },
  { bg: '#f8e8f0', border: '#b55a8a', dot: '#b55a8a' },
  { bg: '#f0e8f8', border: '#7a5ab5', dot: '#7a5ab5' },
  { bg: '#e8f8f8', border: '#3a9aaa', dot: '#3a9aaa' },
];

const CONF_LABELS = ['', 'Very nervous 😬', 'A bit shaky 😟', 'Getting there 😐', 'Pretty solid 🙂', 'I got this! 😎'];

const ENCOURAGEMENTS = [
  "Every page you study is a step closer. 💛",
  "Progress, not perfection. Keep going! 🌟",
  "You're doing better than you think. 🎯",
  "One subject at a time. You've got this! 🚀",
  "Rest is part of the plan. So is you. 💪",
  "Hard subjects first = easy exam day. ✨",
  "Your future self is cheering you on! 🎉",
];

const DAY_QUOTES = [
  "Warm up gently. The best is ahead. ☀️",
  "Finding your rhythm now. Keep it steady! 🎵",
  "You're in the zone. Trust the process. 🔥",
  "Stronger than yesterday. Believe it! ⚡",
  "Final push. You've put in the work. 🏁",
  "Review day. Make it count! 📝",
  "Exam day. Show them what you know! 🎓",
];

/* ── State ───────────────────────────────────────────────────────── */
let subjects = JSON.parse(localStorage.getItem('sm_subjects') || '[]');
let schedule = JSON.parse(localStorage.getItem('sm_schedule') || '[]');
let doneMap  = JSON.parse(localStorage.getItem('sm_done')     || '{}');
let conf     = 5;

/* ── Init ────────────────────────────────────────────────────────── */
function init() {
  // set min date to today
  document.getElementById('subj-date').min = todayStr();
  renderSubjectList();
  if (schedule.length) {
    document.getElementById('schedule-section').classList.add('visible');
    renderSchedule();
    updateProgress();
  }
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function save() {
  localStorage.setItem('sm_subjects', JSON.stringify(subjects));
  localStorage.setItem('sm_schedule', JSON.stringify(schedule));
  localStorage.setItem('sm_done',     JSON.stringify(doneMap));
}

/* ── Confidence ──────────────────────────────────────────────────── */
function setConf(v) {
  conf = v;
  document.querySelectorAll('.conf-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === v);
  });
  document.getElementById('conf-label').textContent = `Confidence: ${CONF_LABELS[v]} (${v}/5)`;
}

/* ── Add subject ─────────────────────────────────────────────────── */
function addSubject() {
  const name = document.getElementById('subj-name').value.trim();
  const date = document.getElementById('subj-date').value;
  if (!name) return showToast('Please enter a subject name 📝');
  if (!date) return showToast('Please pick an exam date 📅');
  if (subjects.some(s => s.name.toLowerCase() === name.toLowerCase()))
    return showToast('Subject already added!');

  subjects.push({ id: Date.now().toString(), name, date, conf, color: PALETTE[subjects.length % PALETTE.length] });
  save();
  document.getElementById('subj-name').value = '';
  document.getElementById('subj-date').value = '';
  renderSubjectList();
  showToast(`"${name}" added! 🎉`);
}

function removeSubject(id) {
  subjects = subjects.filter(s => s.id !== id);
  schedule = [];
  save();
  renderSubjectList();
  document.getElementById('schedule-section').classList.remove('visible');
}

function renderSubjectList() {
  const card = document.getElementById('subjects-card');
  const list = document.getElementById('subject-list');
  const btn  = document.getElementById('gen-btn');
  const msg  = document.getElementById('encourage-msg');
  const cnt  = document.getElementById('subj-count');

  if (!subjects.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  cnt.textContent = subjects.length;

  list.innerHTML = subjects.map(s => `
    <div class="subject-chip">
      <div class="chip-color" style="background:${s.color.dot}"></div>
      <div class="chip-info">
        <div class="chip-name">${s.name}</div>
        <div class="chip-meta">📅 ${formatDate(s.date)} &nbsp;·&nbsp; Confidence ${s.conf}/5</div>
      </div>
      <span class="chip-conf">${['','😬','😟','😐','🙂','😎'][s.conf]}</span>
      <button class="btn-danger" onclick="removeSubject('${s.id}')" title="Remove">✕</button>
    </div>
  `).join('');

  if (subjects.length >= 3) {
    btn.disabled = false;
    msg.textContent = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
  } else {
    btn.disabled = true;
    msg.textContent = `Add ${3 - subjects.length} more subject${3 - subjects.length > 1 ? 's' : ''} to unlock your plan ✨`;
  }
}

/* ── Schedule generation ─────────────────────────────────────────── */
function generatePlan() {
  if (subjects.length < 3) return;

  const today  = new Date(); today.setHours(0,0,0,0);
  const sorted = [...subjects].sort((a, b) => {
    const da = new Date(a.date), db = new Date(b.date);
    const urgA = (da - today) / 86400000 / a.conf;
    const urgB = (db - today) / 86400000 / b.conf;
    return urgA - urgB;
  });

  // Build 3 full days + 3 evenings + 1 half-day (exam day)
  const slots = [];
  const labels = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    slots.push({ date: d, sessions: [] });
    labels.push(i < 6 ? (i % 2 === 0 ? 'Day' : 'Evening') : 'Exam Morning');
  }

  // Allocate sessions: weight by (1/conf) * urgency
  const totalSlotsPerDay = [3, 2, 3, 2, 3, 2, 1]; // day slots available
  const allSlots = [];
  slots.forEach((sl, di) => {
    for (let s = 0; s < totalSlotsPerDay[di]; s++) allSlots.push({ dayIdx: di, slotIdx: s });
  });

  // Distribute sessions proportionally (lower confidence = more sessions)
  const weights = sorted.map(s => 6 - s.conf + 1); // 2..6
  const totalW  = weights.reduce((a, b) => a + b, 0);
  const total   = allSlots.length;
  const counts  = weights.map(w => Math.round((w / totalW) * total));
  // Fix rounding
  let diff = total - counts.reduce((a, b) => a + b, 0);
  counts[0] += diff;

  // Fill days
  let pool = [];
  sorted.forEach((s, i) => { for (let k = 0; k < counts[i]; k++) pool.push(s); });
  // Shuffle slightly to avoid monotone blocks — but keep priority by interleaving
  function interleave(arr) {
    const result = []; let len = arr.length;
    while (result.length < len) {
      // pick from unique subjects first
      const seen = new Set();
      for (let i = 0; i < arr.length; i++) {
        if (!seen.has(arr[i].id)) { seen.add(arr[i].id); result.push(arr.splice(i--, 1)[0]); }
      }
    }
    return result;
  }
  pool = interleave(pool);

  const SESSION_TIMES = [
    ['8:00 AM', '9:30 AM'],['10:00 AM','11:30 AM'],['2:00 PM','3:30 PM'],
    ['5:00 PM','6:30 PM'],['7:00 PM','8:30 PM'],['9:00 PM','10:00 PM'],
    ['8:00 AM','10:00 AM'],
  ];
  let poolIdx = 0;
  slots.forEach((sl, di) => {
    for (let s = 0; s < totalSlotsPerDay[di]; s++) {
      if (poolIdx >= pool.length) break;
      const subj = pool[poolIdx++];
      const time = SESSION_TIMES[di < 6 ? (di % 2 === 0 ? s : s + 3) : 0] || ['Study time',''];
      sl.sessions.push({
        subjId: subj.id,
        name: subj.name,
        color: subj.color,
        conf: subj.conf,
        timeStart: time[0],
        timeEnd: time[1],
        id: `${di}-${s}-${subj.id}`,
      });
    }
    // Mark exam sessions
    const examsToday = subjects.filter(s => s.date === fmtISO(sl.date));
    sl.exams = examsToday;
    sl.label = labels[di];
    sl.dayIdx = di;
  });

  schedule = slots;
  doneMap = {};
  save();

  document.getElementById('schedule-section').classList.add('visible');
  document.getElementById('schedule-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  renderSchedule();
  updateProgress();
  showToast('Your plan is ready! Go get it 🚀');
}

function fmtISO(d) { return d.toISOString().split('T')[0]; }

function renderSchedule() {
  const out = document.getElementById('schedule-output');
  if (!schedule.length) { out.innerHTML = ''; return; }

  const today = new Date(); today.setHours(0,0,0,0);
  out.innerHTML = schedule.map((day, di) => {
    const isExamDay = di === 6;
    const quote = DAY_QUOTES[di] || '';
    const examBadges = day.exams?.map(e =>
      `<span class="exam-badge">📝 ${e.name} exam</span>`).join(' ') || '';

    const sessions = day.sessions.map(sess => {
      const done = !!doneMap[sess.id];
      return `
        <div class="session ${done ? 'done' : ''}" id="sess-${sess.id}"
          style="background:${sess.color.bg}; border-left-color:${sess.color.border};"
          onclick="toggleDone('${sess.id}')">
          <div class="session-dot" style="background:${sess.color.dot}"></div>
          <div class="session-info">
            <div class="session-name">${sess.name}</div>
            <div class="session-time">⏱ ${sess.timeStart} – ${sess.timeEnd}</div>
          </div>
          <div class="session-check">${done ? '✓' : ''}</div>
        </div>`;
    }).join('');

    const emptyMsg = isExamDay
      ? `<div class="empty">Light review only — you've already done the hard work 💪</div>`
      : '';

    return `
      <div class="day-block" style="animation-delay:${di * 0.07}s">
        <div class="day-header">
          <div>
            <div class="day-name">${isExamDay ? '🎓 Exam Morning' : `${['Day 1','Evening 1','Day 2','Evening 2','Day 3','Evening 3'][di]}`}
              &nbsp;<span style="font-size:.8rem; color:var(--text3); font-weight:400">${formatDate(fmtISO(day.date))}</span>
            </div>
            <div style="margin-top:4px">${examBadges}</div>
          </div>
          <span class="day-quote">${quote}</span>
        </div>
        <div class="day-sessions">${sessions || emptyMsg}</div>
      </div>`;
  }).join('');
}

function toggleDone(id) {
  doneMap[id] = !doneMap[id];
  save();
  // Update session class in place
  const el = document.getElementById(`sess-${id}`);
  if (el) {
    el.classList.toggle('done', !!doneMap[id]);
    el.querySelector('.session-check').textContent = doneMap[id] ? '✓' : '';
  }
  updateProgress();
}

/* ── Progress ────────────────────────────────────────────────────── */
function updateProgress() {
  if (!schedule.length) return;
  const allSessions = schedule.flatMap(d => d.sessions);
  const total = allSessions.length;
  const done  = allSessions.filter(s => !!doneMap[s.id]).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('overall-pct').textContent = `${pct}%`;
  document.getElementById('overall-fill').style.width = `${pct}%`;

  // Per-subject
  const bySubj = {};
  subjects.forEach(s => { bySubj[s.id] = { name: s.name, color: s.color, total: 0, done: 0 }; });
  allSessions.forEach(s => {
    if (bySubj[s.subjId]) {
      bySubj[s.subjId].total++;
      if (doneMap[s.id]) bySubj[s.subjId].done++;
    }
  });

  const rows = Object.values(bySubj).filter(x => x.total > 0).map(x => {
    const p = Math.round((x.done / x.total) * 100);
    return `
      <div class="sp-row">
        <div class="sp-name" title="${x.name}">${x.name}</div>
        <div class="sp-bar"><div class="sp-fill" style="width:${p}%; background:${x.color.dot}"></div></div>
        <div class="sp-pct">${p}%</div>
      </div>`;
  }).join('');
  document.getElementById('subj-progress').innerHTML = rows;
}

/* ── Copy Plan ───────────────────────────────────────────────────── */
function copyPlan() {
  if (!schedule.length) return;
  let text = '📚 STUDY PLAN — Generated by StudyMap\n\n';
  schedule.forEach((day, di) => {
    text += `━━ ${di === 6 ? 'Exam Morning' : ['Day 1','Evening 1','Day 2','Evening 2','Day 3','Evening 3'][di]} (${formatDate(fmtISO(day.date))}) ━━\n`;
    if (day.sessions.length) {
      day.sessions.forEach(s => { text += `  • ${s.name} · ${s.timeStart} – ${s.timeEnd}\n`; });
    } else {
      text += `  • Light review or rest\n`;
    }
    if (day.exams?.length) day.exams.forEach(e => { text += `  📝 EXAM: ${e.name}\n`; });
    text += '\n';
  });
  text += 'You can do this! 💛';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 Copy Plan'; }, 2000);
  });
}

/* ── Pomodoro ────────────────────────────────────────────────────── */
const POMO_MODES = { focus: 25*60, short: 5*60, long: 15*60 };
let pomoMode     = 'focus';
let pomoLeft     = POMO_MODES.focus;
let pomoRunning  = false;
let pomoInterval = null;
let pomoCount    = 0;

function setPomoMode(mode) {
  if (pomoRunning) pomodoroReset();
  pomoMode = mode;
  pomoLeft = POMO_MODES[mode];
  document.querySelectorAll('.pomo-btn[id^=mode-]').forEach(b => b.classList.remove('active'));
  document.getElementById(`mode-${mode}`).classList.add('active');
  renderPomo();
  document.getElementById('pomo-phase').textContent = mode === 'focus'
    ? 'Ready to focus! 🍅' : mode === 'short' ? 'Quick break ☕' : 'Long break 🌿';
}

function pomodoroToggle() {
  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
    document.getElementById('pomo-start-btn').textContent = '▶ Resume';
  } else {
    pomoRunning = true;
    document.getElementById('pomo-start-btn').textContent = '⏸ Pause';
    document.getElementById('pomo-phase').textContent = pomoMode === 'focus'
      ? 'Focusing… 🔥' : pomoMode === 'short' ? 'Short break ☕' : 'Long break 🌿';
    pomoInterval = setInterval(() => {
      pomoLeft--;
      if (pomoLeft <= 0) {
        clearInterval(pomoInterval);
        pomoRunning = false;
        if (pomoMode === 'focus') pomoCount++;
        document.getElementById('pomo-count').textContent = pomoCount;
        document.getElementById('pomo-start-btn').textContent = '▶ Start';
        document.getElementById('pomo-phase').textContent = pomoMode === 'focus'
          ? `Session done! Take a break 🎉 (${pomoCount} total)` : 'Break over — back to it! 💪';
        try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAA').play(); } catch(e) {}
        showToast(pomoMode === 'focus' ? '🍅 Focus session complete!' : '⏰ Break is over!');
        pomoLeft = POMO_MODES[pomoMode];
      }
      renderPomo();
    }, 1000);
  }
}

function pomodoroReset() {
  clearInterval(pomoInterval);
  pomoRunning = false;
  pomoLeft = POMO_MODES[pomoMode];
  document.getElementById('pomo-start-btn').textContent = '▶ Start';
  document.getElementById('pomo-phase').textContent = pomoMode === 'focus'
    ? 'Ready to focus 🍅' : pomoMode === 'short' ? 'Quick break ☕' : 'Long break 🌿';
  renderPomo();
}

function renderPomo() {
  const m = String(Math.floor(pomoLeft / 60)).padStart(2, '0');
  const s = String(pomoLeft % 60).padStart(2, '0');
  document.getElementById('pomo-display').textContent = `${m}:${s}`;
  document.getElementById('pomo-label').textContent = pomoMode === 'focus' ? 'Focus' : pomoMode === 'short' ? '5-min Break' : '15-min Break';
  // Update page title
  document.title = pomoRunning ? `${m}:${s} — StudyMap` : 'StudyMap — Your Exam Plan';
}

/* ── Dark mode ───────────────────────────────────────────────────── */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
  document.querySelector('.btn-icon').childNodes[1].textContent = isDark ? ' Dark' : ' Light';
  localStorage.setItem('sm_theme', html.dataset.theme);
}

/* ── Helpers ─────────────────────────────────────────────────────── */
function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── Restore theme & boot ────────────────────────────────────────── */
(function() {
  const saved = localStorage.getItem('sm_theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    if (saved === 'dark') {
      document.getElementById('theme-icon').textContent = '☀️';
    }
  }
})();

init();
</script>
